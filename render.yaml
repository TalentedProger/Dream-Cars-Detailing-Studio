services:
  - type: web
    name: dream-cars
    runtime: node
    plan: free
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: NODE_ENV=production node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dream-cars-db
          property: connectionString

databases:
  - name: dream-cars-db
    plan: free
    databaseName: dream_cars
