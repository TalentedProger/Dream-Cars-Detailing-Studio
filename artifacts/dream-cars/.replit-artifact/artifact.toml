kind = "web"
previewPath = "/"
title = "Dream Cars — Детейлинг студия"
version = "1.0.0"
id = "artifacts/dream-cars"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20937
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dream-cars run dev"

[services.env]
PORT = "20937"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dream-cars", "run", "build"]
publicDir = "artifacts/dream-cars/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
